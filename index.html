<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultima Workspace Pro 2026</title>
    <style>
        :root {
            --primary: #00f2fe;
            --glass: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --bg-grad: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-grad); color: var(--text); overflow: hidden;
        }

        /* 畫布層：粒子特效 */
        #canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .main-container {
            width: 90%; max-width: 1000px; display: grid; 
            grid-template-columns: 1.2fr 0.8fr; gap: 25px; z-index: 10;
        }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 30px;
            padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .glass-panel:hover { transform: translateY(-5px); }

        /* 時鐘樣式 */
        #time { font-size: 6rem; font-weight: 900; margin: 0; line-height: 1; letter-spacing: -3px; }
        #date { color: var(--primary); font-size: 1.4rem; font-weight: 300; margin-bottom: 10px; opacity: 0.9; }

        /* 金句區 */
        #quote-container {
            height: 60px; margin-top: 30px; transition: opacity 0.8s ease;
            border-left: 3px solid var(--primary); padding-left: 20px;
        }
        #quote-text { font-size: 1.1rem; color: #ccc; font-style: italic; margin: 0; }

        /* 番茄鐘 */
        .pomo-section { margin-top: 40px; }
        #timer { font-size: 4rem; font-weight: 700; font-variant-numeric: tabular-nums; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 12px; }
        button {
            background: var(--primary); border: none; padding: 12px 25px; 
            border-radius: 15px; font-weight: bold; cursor: pointer; 
            transition: all 0.3s; color: #000;
        }
        button.secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        button:hover { filter: brightness(1.2); transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }

        /* 右側面板：環境音與設置 */
        .right-panel h3 { margin-top: 0; font-weight: 400; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .control-row { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; }
        input[type="range"] { accent-color: var(--primary); width: 120px; cursor: pointer; }

        .theme-dots { display: flex; gap: 15px; margin-top: 30px; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .dot:hover { border-color: white; transform: rotate(15deg); }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
            #time { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="main-container">
        <div class="glass-panel">
            <div id="date">2026年3月19日</div>
            <h1 id="time">00:00:00</h1>
            
            <div id="quote-container">
                <p id="quote-text">「加載中，準備迎接美好的一天...」</p>
            </div>

            <div class="pomo-section">
                <div style="font-size: 0.8rem; letter-spacing: 4px; opacity: 0.5;">FOCUS TIMER</div>
                <div id="timer">25:00</div>
                <div class="btn-group">
                    <button onclick="startTimer()">START</button>
                    <button class="secondary" onclick="pauseTimer()">PAUSE</button>
                    <button class="secondary" onclick="resetTimer()">RESET</button>
                </div>
            </div>
        </div>

        <div class="glass-panel right-panel">
            <h3>AMBIENT MIXER</h3>
            <div class="control-row">
                <span>🌧️ 城市雨聲</span>
                <input type="range" min="0" max="1" step="0.1" value="0" oninput="controlAudio('rain', this.value)">
            </div>
            <div class="control-row">
                <span>🔥 壁爐柴火</span>
                <input type="range" min="0" max="1" step="0.1" value="0" oninput="controlAudio('fire', this.value)">
            </div>
            <div class="control-row">
                <span>🌲 森林晨鳴</span>
                <input type="range" min="0" max="1" step="0.1" value="0" oninput="controlAudio('forest', this.value)">
            </div>

            <h3 style="margin-top: 40px;">THEME SYSTEM</h3>
            <div class="theme-dots">
                <div class="dot" style="background:#00f2fe;" onclick="changeTheme('#00f2fe')"></div>
                <div class="dot" style="background:#ff0080;" onclick="changeTheme('#ff0080')"></div>
                <div class="dot" style="background:#7cfc00;" onclick="changeTheme('#7cfc00')"></div>
                <div class="dot" style="background:#ffa500;" onclick="changeTheme('#ffa500')"></div>
            </div>
        </div>
    </div>

    <audio id="audio-rain" loop src="https://assets.mixkit.co/active_storage/sfx/2536/2536-preview.mp3"></audio>
    <audio id="audio-fire" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="audio-forest" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        // --- 1. 背景粒子特效 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 2 - 1;
                this.alpha = 1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.alpha > 0.02) this.alpha -= 0.01;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) particles.push(new Particle(e.clientX, e.clientY));
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.alpha <= 0.02) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. 時鐘與金句 ---
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toTimeString().split(' ')[0];
            document.getElementById('date').textContent = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const quotes = [
            "「你的才華取決於你的專注。」", "「休息是為了走更長遠的路。」", "「現在的每一步，都在定義未來的你。」",
            "「今天的自律，是明天的自由。」", "「別讓任何人偷走你的夢想。」", "「專注當下，便是最好的修行。」"
        ];
        setInterval(() => {
            const qEl = document.getElementById('quote-container');
            qEl.style.opacity = 0;
            setTimeout(() => {
                document.getElementById('quote-text').textContent = quotes[Math.floor(Math.random() * quotes.length)];
                qEl.style.opacity = 1;
            }, 800);
        }, 5000);

        // --- 3. 番茄鐘邏輯 ---
        let timerIdx, timeLeft = 25 * 60, isRunning = false;
        function startTimer() {
            if (Notification.permission !== "granted") Notification.requestPermission();
            if (isRunning) return;
            isRunning = true;
            timerIdx = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerIdx);
                    new Notification("時間到！", { body: "做得好！現在休息 5 分鐘吧。" });
                    resetTimer();
                } else {
                    timeLeft--;
                    const mins = String(Math.floor(timeLeft/60)).padStart(2,'0');
                    const secs = String(timeLeft%60).padStart(2,'0');
                    document.getElementById('timer').textContent = `${mins}:${secs}`;
                }
            }, 1000);
        }
        function pauseTimer() { clearInterval(timerIdx); isRunning = false; }
        function resetTimer() { pauseTimer(); timeLeft = 25 * 60; document.getElementById('timer').textContent = "25:00"; }

        // --- 4. 功能控制 ---
        function controlAudio(type, vol) {
            const audio = document.getElementById(`audio-${type}`);
            audio.volume = vol;
            vol > 0 ? audio.play() : audio.pause();
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--primary', color);
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
